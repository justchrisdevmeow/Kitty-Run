name: Build Love2D to Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install love.js
      run: |
        npm install -g love.js
        npm install -g love-web-builder
    
    - name: Create .love file
      run: |
        cd KittyRun
        zip -r ../game.love .
        cd ..
    
    - name: Build to Web with love.js
      run: |
        mkdir -p web
        love.js game.love web -t KittyRun
        ls -la web
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kitty-run-web
        path: web/
